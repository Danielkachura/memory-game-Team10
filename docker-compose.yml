services:

  backend:
    build:
      context: ./backend/python_api
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # Optional — only needed if you want Claude-powered squad generation
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
